services:
  pgvector:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-criterio}
      POSTGRES_USER: ${POSTGRES_USER:-criterio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-criterio-local-only}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-criterio} -d ${POSTGRES_DB:-criterio}
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - criterio_pgdata:/var/lib/postgresql

volumes:
  criterio_pgdata:
